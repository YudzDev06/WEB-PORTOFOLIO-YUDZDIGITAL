<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yudzdigital.id</title>
    <meta name="google-site-verification" content="UfSnNllslPvi4BDoTUvX6N5auG_CWwPVbkFEMaBM_mI" />
    <link rel="icon" type="image/png" href="fotoprofil.png">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "url": "https://yudzdigital.id",
      "logo": "https://yudzdigital.id/fotoprofil.png"
    }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00ff88;
            --primary-glow: rgba(0, 255, 136, 0.4);
            --bg-dark: #080808;
            --surface: #121212;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border: rgba(255, 255, 255, 0.1);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ... Sisa CSS kamu tetap sama ... */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            text-decoration: none;
        }

        html, body {
            max-width: 100%;
            overflow-x: hidden;
            background: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 2000;
            background: rgba(8, 8, 8, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 8%;
        }

        .logo { font-weight: 800; font-size: 1.3rem; letter-spacing: -1px; color: var(--text-main); }
        .logo span { color: var(--primary); }

        .nav-menu { display: flex; gap: 2.5rem; align-items: center; list-style: none; }
        .nav-link { font-size: 0.9rem; font-weight: 600; color: var(--text-muted); transition: var(--transition); }
        .nav-link:hover { color: var(--primary); }

        .hamburger { display: none; cursor: pointer; z-index: 3000; }
        .bar { display: block; width: 25px; height: 2px; background: var(--text-main); margin: 5px 0; transition: 0.4s; }

        /* --- HERO SECTION --- */
        .hero { 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            padding: 100px 8% 50px;
            overflow: hidden;
        }
        
        .hero-grid { 
            display: grid; 
            grid-template-columns: 1.2fr 0.8fr; 
            gap: 40px; 
            align-items: center; 
            width: 100%;
        }

        .hero-content h1 { 
            font-size: clamp(2.5rem, 6vw, 4rem); 
            line-height: 1.1; 
            margin-bottom: 25px;
            font-weight: 800;
        }

        .hero-content p {
            color: var(--text-muted);
            max-width: 550px;
        }

        .btn-hero {
            margin-top: 40px;
        }

        .hero-img-box {
            display: flex;
            justify-content: center;
            position: relative;
        }

        .blob-frame {
            width: min(350px, 80vw);
            height: min(350px, 80vw);
            background: linear-gradient(45deg, var(--primary), #00bcff);
        }
    </style>
</head>
<body>
    </body>
</html>
